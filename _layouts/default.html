<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | escape }}</title>
  </head>
  <body>
    <header>
      <h1>{{ site.title }}</h1>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p id="last-updated-footer">
        © Philip Gregory Bachas-Daunert | Last updated: <span id="last-updated"></span>
      </p>
    </footer>

    <!-- JavaScript for dynamic last updated date -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const lastUpdatedElement = document.getElementById("last-updated");

        // Inject the last build time using Jekyll's Liquid syntax
        const lastModified = new Date("{{ site.time | date: '%Y-%m-%d' }}");

        // Calculate the quarter and year
        const quarters = ["Q1", "Q2", "Q3", "Q4"];
        const quarter = quarters[Math.floor(lastModified.getMonth() / 3)];
        const year = lastModified.getFullYear();

        // Set the footer text
        lastUpdatedElement.textContent = `$ {quarter} $ {year}`;
      });
    </script>
  </body>
</html>
