# Site Information
title: "Philip Gregory Bachas-Daunert"
description: "Business Analyst"
remote_theme: just-the-docs/just-the-docs

# Theme Configuration
just_the_docs:
  # Enable navigation bar
  nav_enabled: true
  # Collapsible sidebar sections
  collapse_section: true
  # Table of Contents (TOC)
  toc:
    min_level: 1
    max_level: 6
    show: true
  # Heading anchors for direct links
  heading_anchors: true

# Navigation Order (front matter takes precedence)
# Use `nav_order` in each markdown file for customization.

# Color Scheme
color_scheme: dark # Options: light, dark, or custom

# Logo and Favicon
logo: "/assets/images/qr-code.png" # Path to your logo file
favicon_ico: "/assets/images/favicon.ico" # Optional: path to favicon

# Footer Content
footer_content: ""

# Auxiliary Links (header)
aux_links:
  "GitHub Profile": //github.com/hihipy
  "LinkedIn": //linkedin.com/in/pbachas
  "Bitly Link-in-bio": //bit.ly/m/pgbd
aux_links_new_tab: true # Open auxiliary links in a new tab

# Search
search_enabled: true
search:
  heading_level: 6 # Allow all heading levels (h1 to h6) in search and TOC

# Sass Configuration for Custom SCSS
sass:
  sass_dir: _sass

# Markdown Processing
markdown: kramdown
kramdown:
  input: GFM # GitHub Flavored Markdown
  syntax_highlighter: rouge # Syntax highlighting for code blocks