# Site Information
title: "Philip Gregory Bachas-Daunert"
description: "Business Analyst"
remote_theme: just-the-docs/just-the-docs

# Theme Configuration
just_the_docs:
  nav_enabled: true
  collapse_section: true
  collections:
    pages:
      nav:
        level: 6
  nav:
    level: 6
  toc:
    min_level: 1
    max_level: 6
    show: true
  heading_anchors: true

color_scheme: custom
enable_theme_toggle: true

logo: "/assets/images/qr-code.png"
favicon_ico: "/assets/images/favicon.ico"
footer_content: ""

aux_links:
  "GitHub Profile": //github.com/hihipy
  "LinkedIn": //linkedin.com/in/pbachas
  "Bitly Link-in-bio": //bit.ly/m/pgbd
aux_links_new_tab: true

search_enabled: true
search:
  heading_level: 6

sass:
  sass_dir: _sass

markdown: kramdown
kramdown:
  input: GFM
  toc_levels: "1..6"
  syntax_highlighter: rouge