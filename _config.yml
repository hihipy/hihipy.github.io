# Site Settings
title: "Philip Gregory Bachas-Daunert"
description: "Data Analyst | Portfolio & Professional CV"
url: "https://hihipy.github.io"
baseurl: ""
repository: "hihipy/hihipy.github.io"

# Theme and Layout
theme: jekyll-theme-leap-day
markdown: kramdown
kramdown:
  toc_levels: 1..3
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# Plugin Settings
plugins:
  - jekyll-toc
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# TOC Settings
toc:
  min_level: 1
  max_level: 3
  ordered_list: false
  no_toc_section_class: no_toc_section
  list_class: section-nav
  sublist_class: toc-sublist
  item_class: toc-entry

# Custom Variables
author: "Philip Gregory Bachas-Daunert"
linkedin: "" # Add your LinkedIn profile URL
github: "hihipy"
email: "" # Add your professional email

# Build Settings
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Additional Settings
timezone: America/New_York
encoding: utf-8
safe: true
