<script>
    function toggleTheme() {
        const body = document.querySelector('body');
        const currentTheme = body.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        jtd.setTheme(newTheme);
    }

    window.addEventListener('DOMContentLoaded', function () {
        const nav = document.querySelector('.nav-list');
        if (nav) {
            const container = document.createElement('div');
            container.className = 'theme-toggle-container';
            container.innerHTML = `<button onclick="toggleTheme()" class="theme-toggle-button">Toggle Theme</button>`;
            nav.parentNode.insertBefore(container, nav);
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.querySelector('body').setAttribute('data-theme', savedTheme);
        }
    });
</script>
