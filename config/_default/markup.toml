# Markup configuration required by Blowfish for proper rendering.
# Always keep this file present in config/_default/.

[goldmark]
  [goldmark.renderer]
    unsafe = true   # allows raw HTML in markdown (needed for some shortcodes)

  # Pass math through verbatim so underscores inside formulas are not
  # parsed as emphasis (retires BUG-029). Math uses SINGLE-backslash
  # delimiters: \[ ... \] and \( ... \), which KaTeX matches by default.
  [goldmark.extensions.passthrough]
    enable = true
    [goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)']]

[highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = true
  tabWidth = 2

[tableOfContents]
  endLevel = 2
  ordered = false
  startLevel = 2
