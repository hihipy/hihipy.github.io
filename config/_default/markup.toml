# Markup configuration required by Blowfish for proper rendering.
# Always keep this file present in config/_default/.

[goldmark]
  [goldmark.renderer]
    unsafe = true   # allows raw HTML in markdown (needed for some shortcodes)

[highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = true
  tabWidth = 2

[tableOfContents]
  endLevel = 2
  ordered = false
  startLevel = 2
